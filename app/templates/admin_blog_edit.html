


{% extends "base.html" %}

{% block title %}Edit Post - myTemplates{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<div class="admin-container">
    <div class="admin-header">
        <h1>Edit Blog Post</h1>
        <a href="/admin/blog" class="btn btn-secondary">Back</a>
    </div>

    <div class="admin-card">
        <form method="POST" class="admin-form">
            <label>Title</label>
            <input type="text" name="title" value="{{ post.title }}" required>

            <label>Content (HTML or Markdown)</label>
            <textarea name="content" rows="8" required>{{ post.content }}</textarea>

            <label>Image URL</label>
            <input type="url" name="image_url" value="{{ post.image_url or '' }}">

            <label>Content Format</label>
            <select name="content_format">
                <option value="html" {% if post.content_format == 'html' %}selected{% endif %}>HTML</option>
                <option value="markdown" {% if post.content_format == 'markdown' %}selected{% endif %}>Markdown</option>
            </select>

            <label>
                <input type="checkbox" name="is_published" {% if post.is_published %}checked{% endif %}> Published
            </label>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>

{% endblock %}
