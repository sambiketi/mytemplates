


{% extends "base.html" %}

{% block title %}Privacy Policy - myTemplates{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<div class="admin-container">
    <div class="admin-header">
        <h1>Privacy Policy</h1>
        <a href="/admin/dashboard" class="btn btn-secondary">Back</a>
    </div>

    <div class="admin-card">
        <form method="POST" class="admin-form">
            <label>Content (HTML or Markdown)</label>
            <textarea name="content" rows="16" required>{{ privacy.content }}</textarea>

            <label>Content Format</label>
            <select name="content_format">
                <option value="html" {% if privacy.content_format == 'html' %}selected{% endif %}>HTML</option>
                <option value="markdown" {% if privacy.content_format == 'markdown' %}selected{% endif %}>Markdown</option>
            </select>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>

{% endblock %}
