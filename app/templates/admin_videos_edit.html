


{% extends "base.html" %}

{% block title %}Edit Video - myTemplates{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block content %}

<div class="admin-container">
    <div class="admin-header">
        <h1>Edit Video</h1>
        <a href="/admin/videos" class="btn btn-secondary">Back</a>
    </div>

    <div class="admin-card">
        <form method="POST" class="admin-form">
            <label>Title</label>
            <input type="text" name="title" value="{{ video.title }}" required>

            <label>YouTube URL</label>
            <input type="url" name="video_url" value="{{ video.video_url }}" required>

            <label>Description</label>
            <textarea name="description" rows="4">{{ video.description or '' }}</textarea>

            <label>Category</label>
            <input type="text" name="category" value="{{ video.category }}">

            <label>
                <input type="checkbox" name="is_active" {% if video.is_active %}checked{% endif %}> Active
            </label>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>

{% endblock %}
