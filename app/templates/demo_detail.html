


{% extends "base.html" %}

{% block title %}{{ video.title }} - myTemplates{% endblock %}

{% block content %}

<div class="container" style="max-width:800px;margin:0 auto;padding:24px 20px 48px;">
    <div style="padding-bottom:16px;">
        <a href="/demos" style="color:var(--black-60);text-decoration:none;font-size:14px;">&larr; Back to Demos</a>
    </div>
    
    <div style="border:2px solid var(--black);border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9;background:var(--black);">
        <iframe src="{{ video.embed_url }}" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
    </div>
    
    <div style="margin-top:24px;">
        <span style="display:inline-block;background:var(--yellow);color:var(--black);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:4px 12px;border-radius:9999px;">{{ video.category }}</span>
        <h1 style="font-size:28px;font-weight:800;margin:8px 0 12px;">{{ video.title }}</h1>
        <p style="font-size:16px;line-height:1.8;color:var(--black-80);">{{ video.description or '' }}</p>
    </div>
</div>

{% endblock %}
